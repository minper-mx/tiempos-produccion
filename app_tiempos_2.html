<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F172A">
<meta name="mobile-web-app-capable" content="yes">
<title>Tiempos · Producción</title>
<style>
  :root {
    --bg:        #0F172A;
    --surface:   #1E293B;
    --surface2:  #273449;
    --border:    #334155;
    --text:      #F1F5F9;
    --muted:     #94A3B8;
    --accent:    #38BDF8;
    --green:     #4ADE80;
    --green-dk:  #16A34A;
    --amber:     #FBBF24;
    --red:       #F87171;
    --radius:    14px;
    --radius-sm: 8px;
    --touch:     56px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body { min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 16px; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; padding-top: 60px; padding-bottom: 100px; }

  /* iOS Safari: topbar fijo arriba, contenido hace scroll normal */
  .app { display: block; }
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 16px; font-weight: 600; letter-spacing: -.02em; }
  .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .fab { position: fixed; bottom: 24px; right: 20px; z-index: 90; width: 64px; height: 64px; border-radius: 50%; background: var(--accent); border: none; color: #0F172A; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(56,189,248,.4); cursor: pointer; transition: transform .12s; }
  .fab:active { transform: scale(.92); }
  .content { padding: 12px 14px 0; display: flex; flex-direction: column; gap: 10px; }

  .sec-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 4px 2px 6px; }

  /* Tarjetas: tamaño FIJO, nunca se comprimen */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex-shrink: 0; }
  .card-active { border-color: var(--amber); }
  .card-done   { border-color: var(--green-dk); opacity: .8; }
  .card-head   { padding: 14px 14px 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-info   { flex: 1; min-width: 0; }
  .card-prod   { font-size: 16px; font-weight: 600; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-op     { font-size: 14px; color: var(--muted); margin-top: 3px; }
  .card-chips  { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .chip { font-size: 12px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .chip-warn { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.4); color: var(--amber); }
  .chip-ok   { background: rgba(74,222,128,.12); border-color: rgba(74,222,128,.4); color: var(--green); }

  /* Timer siempre en tamaño fijo */
  .timer       { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--amber); letter-spacing: -.02em; flex-shrink: 0; text-align: right; white-space: nowrap; }
  .timer-label { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; white-space: nowrap; }
  .card-foot   { padding: 10px 12px 12px; display: flex; gap: 8px; }

  /* Botones con altura mínima garantizada */
  .btn { display: flex; align-items: center; justify-content: center; gap: 7px; min-height: var(--touch); border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .1s, opacity .1s; padding: 0 18px; font-family: inherit; flex-shrink: 0; }
  .btn:active  { transform: scale(.96); opacity: .85; }
  .btn-close   { flex: 1; background: rgba(74,222,128,.15); border-color: rgba(74,222,128,.5); color: var(--green); font-size: 16px; min-height: 52px; }
  .btn-note    { width: 52px; height: 52px; flex-shrink: 0; font-size: 20px; padding: 0; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #0F172A; font-size: 16px; }
  .btn-ghost   { background: transparent; border-color: var(--border); color: var(--muted); font-size: 14px; font-weight: 400; }

  /* Historial */
  .hist { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .hist-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
  .hist-row:last-child { border-bottom: none; }
  .hist-prod { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-op   { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .hist-right { text-align: right; flex-shrink: 0; }
  .hist-mins { font-size: 16px; font-weight: 700; color: var(--green); }
  .hist-time { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 10px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; letter-spacing: -.03em; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-val-warn { color: var(--amber); }
  .stat-val-ok   { color: var(--green); }

  /* Bottom sheet */
  .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .22s; }
  .sheet-bg.open { opacity: 1; pointer-events: all; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 0 0 env(safe-area-inset-bottom, 16px); width: 100%; max-height: 90%; overflow-y: auto; transform: translateY(100%); transition: transform .25s cubic-bezier(.32,1,.45,1); }
  .sheet-bg.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  .sheet-title { font-size: 18px; font-weight: 700; padding: 14px 20px 10px; }
  .sheet-body { padding: 4px 18px 20px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: var(--muted); font-weight: 500; }
  select, input, textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; font-family: inherit; padding: 14px 14px; -webkit-appearance: none; appearance: none; min-height: var(--touch); }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 80px; resize: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sheet-actions { display: flex; flex-direction: column; gap: 8px; padding: 4px 18px 8px; }
  .hint { font-size: 12px; color: var(--muted); background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.2); border-radius: var(--radius-sm); padding: 10px 12px; line-height: 1.5; }

  /* Campo oculto que aparece al seleccionar "Otro" */
  .field-extra { display: none; }
  .field-extra.visible { display: flex; }

  /* Campos de nombre de operadores */
  .ops-names { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .ops-names input { min-height: 48px; font-size: 15px; }

  /* Resumen */
  .res-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .res-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 4px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .res-table td { padding: 8px 4px; border-bottom: 1px solid rgba(51,65,85,.5); vertical-align: top; }
  .res-table tr:last-child td { border-bottom: none; }
  .tabs { display: flex; gap: 4px; padding: 0 18px 12px; }
  .tab { flex: 1; padding: 9px 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0F172A; }
  .export-row { display: flex; gap: 8px; padding: 0 18px 4px; }

  .obs-badge { margin: 0 14px 10px; display: flex; gap: 6px; align-items: flex-start; font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 6px; padding: 7px 10px; border: 1px solid var(--border); }
  .empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 14px; }
  .empty svg { width: 36px; height: 36px; stroke: var(--border); margin: 0 auto 10px; display: block; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">⏱ Tiempos de Producción</div>
      <div class="topbar-sub" id="fecha-hoy"></div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn btn-ghost" style="min-height:40px;padding:0 10px;font-size:13px" onclick="exportCSV()" title="Exportar CSV">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV
      </button>
      <button class="btn btn-ghost" style="min-height:40px;padding:0 10px;font-size:13px" onclick="abrirResumen()">Resumen</button>
    </div>
  </div>
  <!-- Aviso pérdida de datos en iPhone -->
  <div id="ios-banner" style="display:none;background:rgba(251,191,36,.15);border-bottom:1px solid rgba(251,191,36,.3);padding:8px 14px;font-size:12px;color:var(--amber);line-height:1.4;margin-bottom:8px">
    ⚠ Exporta el CSV antes de cerrar Safari o se pierden los datos del turno.
  </div>
  <div class="content" id="content"></div>
</div>

<button class="fab" onclick="abrirNuevo()" aria-label="Registrar inicio de proceso">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ── Sheet: Nuevo proceso ── -->
<div class="sheet-bg" id="sheet-nuevo" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Registrar inicio</div>
    <div class="sheet-body">

      <!-- Familia + campo libre si es "Otro" -->
      <div class="field">
        <label>Familia</label>
        <select id="np-familia" onchange="onFamiliaChange()">
          <option value="">— Selecciona —</option>
          <option value="SS">Shim Set (Calza)</option>
          <option value="GC">Guardas y Guardacoples</option>
          <option value="TB">Tapa de Brida</option>
          <option value="OT">Otro</option>
        </select>
      </div>
      <div class="field field-extra" id="np-familia-otro-wrap">
        <label>Especifica la familia</label>
        <input id="np-familia-otro" placeholder="Nombre de la familia…" autocomplete="off" />
      </div>

      <div class="field-row">
        <div class="field">
          <label>Clave / Ref.</label>
          <input id="np-clave" placeholder="SS-4.5-A" autocomplete="off" />
        </div>
        <div class="field">
          <label>Orden / Línea</label>
          <input id="np-lote" placeholder="70055-0" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label>Descripción</label>
        <input id="np-desc" placeholder="Ej. Calza 4.5mm, acero 1018" autocomplete="off" />
      </div>

      <!-- Operación + campo libre si es "Otra" -->
      <div class="field">
        <label>Operación</label>
        <select id="np-op" onchange="onOpChange()">
          <option value="">— Selecciona —</option>
          <option>Preparación de material</option>
          <option>Corte laser</option>
          <option>Corte cizalla</option>
          <option>Rolado</option>
          <option>Doblez</option>
          <option>Soldadura</option>
          <option>Pintura</option>
          <option>Acabado / Limpieza</option>
          <option>Inspección</option>
          <option value="OT_OP">Otra</option>
        </select>
      </div>
      <div class="field field-extra" id="np-op-otro-wrap">
        <label>Especifica la operación</label>
        <input id="np-op-otro" placeholder="Nombre de la operación…" autocomplete="off" />
      </div>

      <div class="field">
        <label>Piezas en este proceso</label>
        <input id="np-pzas" type="number" min="1" placeholder="5" inputmode="numeric" />
      </div>

      <!-- Operadores: número + nombres dinámicos -->
      <div class="field">
        <label>Número de operadores</label>
        <input id="np-nops" type="number" min="1" value="1" inputmode="numeric" onchange="renderNombreOps()" oninput="renderNombreOps()" />
      </div>
      <div id="np-nombres-wrap" class="field" style="display:none">
        <label>Nombre(s) de operador(es)</label>
        <div class="ops-names" id="np-nombres"></div>
      </div>

      <div class="hint">⏰ La hora de inicio se guardará en este momento al confirmar.</div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-primary" style="min-height:58px;font-size:17px" onclick="confirmarNuevo()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Iniciar ahora
      </button>
      <button class="btn btn-ghost" onclick="cerrarSheet('sheet-nuevo')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── Sheet: Cerrar proceso ── -->
<div class="sheet-bg" id="sheet-cierre" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Cerrar proceso</div>
    <div id="cierre-info" style="padding:0 18px 8px;font-size:14px;color:var(--muted)"></div>
    <div class="sheet-body">
      <div class="field-row">
        <div class="field">
          <label>Piezas terminadas</label>
          <input id="c-pzas" type="number" min="0" inputmode="numeric" />
        </div>
        <div class="field">
          <label>Con defecto</label>
          <input id="c-def" type="number" min="0" value="0" inputmode="numeric" />
        </div>
      </div>
      <div class="field">
        <label>Pausa / Interrupción (min)</label>
        <input id="c-pausa" type="number" min="0" value="0" inputmode="numeric" placeholder="0" />
      </div>
      <div class="field">
        <label>Incidencia o nota (opcional)</label>
        <textarea id="c-inc" placeholder="Falla en equipo ~10 min, cambio de electrodo…"></textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-close" style="min-height:58px;font-size:17px" onclick="confirmarCierre()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Confirmar cierre
      </button>
      <button class="btn btn-ghost" onclick="cerrarSheet('sheet-cierre')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── Sheet: Nota rápida ── -->
<div class="sheet-bg" id="sheet-nota" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nota rápida</div>
    <div class="sheet-body">
      <div id="nota-info" style="font-size:14px;color:var(--muted)"></div>
      <div class="field">
        <label>Nota o incidencia</label>
        <textarea id="nota-txt" placeholder="Falla, pausa, ajuste…" style="min-height:100px"></textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-primary" style="min-height:58px" onclick="confirmarNota()">Guardar nota</button>
      <button class="btn btn-ghost" onclick="cerrarSheet('sheet-nota')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ── Sheet: Resumen ── -->
<div class="sheet-bg" id="sheet-resumen" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Resumen del día</div>
    <div class="tabs" role="tablist">
      <button class="tab active" onclick="switchTab(0)" role="tab">Productos</button>
      <button class="tab" onclick="switchTab(1)" role="tab">Operaciones</button>
      <button class="tab" onclick="switchTab(2)" role="tab">Detalle</button>
    </div>
    <div class="export-row">
      <button class="btn" style="flex:1;min-height:44px;font-size:14px" onclick="exportCSV()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar CSV
      </button>
      <button class="btn btn-ghost" style="min-height:44px;font-size:14px" onclick="cerrarSheet('sheet-resumen')">Cerrar</button>
    </div>
    <div id="res-content" style="padding:0 18px 24px"></div>
  </div>
</div>

<script>
// Datos en memoria — funciona en cualquier navegador/iPhone sin restricciones
let data = [];
let cerrandoId = null, notaId = null;

// Intentar recuperar de localStorage si está disponible (Android/escritorio)
try {
  const saved = localStorage.getItem('rtp_v3');
  if (saved) data = JSON.parse(saved);
} catch(e) { /* iPhone con archivo local: localStorage bloqueado, arranca vacío */ }

function save() {
  try { localStorage.setItem('rtp_v3', JSON.stringify(data)); } catch(e) {}
  // Si hay procesos cerrados, mantener CSV listo para exportar fácilmente
}

// Alerta al cerrar ventana/pestaña si hay datos sin exportar
window.addEventListener('beforeunload', function(e) {
  if (cerrados().length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});
function uid()  { return Date.now() + '_' + Math.random().toString(36).slice(2,5); }
function now()  { return new Date(); }
function hhmm(d){ return new Date(d).toTimeString().slice(0,5); }
function mins(a,b){ return Math.round((new Date(b)-new Date(a))/60000); }
function pad(n) { return String(n).padStart(2,'0'); }
function elapsed(iso){ const ms=Date.now()-new Date(iso).getTime(), m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000); return pad(m)+':'+pad(s); }
function todayStr(){ return new Date().toDateString(); }
function todayRecs(){ return data.filter(p=>new Date(p.inicio).toDateString()===todayStr()); }
function activos()  { return todayRecs().filter(p=>!p.fin); }
function cerrados() { return todayRecs().filter(p=>!!p.fin).sort((a,b)=>new Date(b.fin)-new Date(a.fin)); }
function netMins(p) { return Math.max(0,mins(p.inicio,p.fin)-(p.pausa||0)); }

const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fechaHoy(){ const d=new Date(); return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`; }
document.getElementById('fecha-hoy').textContent = fechaHoy();

// ── Sheets ───────────────────────────────────────────────────────────────
function abrirSheet(id){
  const el=document.getElementById(id);
  el.classList.add('open');
  el.addEventListener('click',e=>{ if(e.target===el) cerrarSheet(id); },{once:true});
}
function cerrarSheet(id){ document.getElementById(id).classList.remove('open'); }

// ── Lógica Familia "Otro" ─────────────────────────────────────────────────
function onFamiliaChange(){
  const v = document.getElementById('np-familia').value;
  const wrap = document.getElementById('np-familia-otro-wrap');
  if(v==='OT'){ wrap.classList.add('visible'); document.getElementById('np-familia-otro').focus(); }
  else { wrap.classList.remove('visible'); document.getElementById('np-familia-otro').value=''; }
  // Prefijo clave
  const el=document.getElementById('np-clave');
  if(!el.value && v && v!=='OT'){ el.placeholder=v+'-'; }
}

// ── Lógica Operación "Otra" ───────────────────────────────────────────────
function onOpChange(){
  const v = document.getElementById('np-op').value;
  const wrap = document.getElementById('np-op-otro-wrap');
  if(v==='OT_OP'){ wrap.classList.add('visible'); document.getElementById('np-op-otro').focus(); }
  else { wrap.classList.remove('visible'); document.getElementById('np-op-otro').value=''; }
}

// ── Nombres dinámicos de operadores ──────────────────────────────────────
function renderNombreOps(){
  const n = parseInt(document.getElementById('np-nops').value)||1;
  const wrap = document.getElementById('np-nombres-wrap');
  const cont = document.getElementById('np-nombres');
  if(n < 1){ wrap.style.display='none'; return; }
  wrap.style.display='flex';
  // Mantener valores ya escritos
  const existing = Array.from(cont.querySelectorAll('input')).map(i=>i.value);
  cont.innerHTML='';
  for(let i=0;i<n;i++){
    const inp=document.createElement('input');
    inp.type='text';
    inp.placeholder=`Operador ${i+1}`;
    inp.autocomplete='off';
    inp.style.minHeight='48px';
    inp.value=existing[i]||'';
    cont.appendChild(inp);
  }
}

// ── Nuevo proceso ─────────────────────────────────────────────────────────
function abrirNuevo(){
  ['np-familia','np-clave','np-lote','np-desc','np-op','np-familia-otro','np-op-otro'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('np-pzas').value='';
  document.getElementById('np-nops').value='1';
  document.getElementById('np-familia-otro-wrap').classList.remove('visible');
  document.getElementById('np-op-otro-wrap').classList.remove('visible');
  renderNombreOps();
  abrirSheet('sheet-nuevo');
}

function getNombresOps(){
  return Array.from(document.getElementById('np-nombres').querySelectorAll('input'))
    .map(i=>i.value.trim()).filter(Boolean);
}

function confirmarNuevo(){
  const famSel  = document.getElementById('np-familia').value;
  const famOtro = document.getElementById('np-familia-otro').value.trim();
  const familia = famSel==='OT' ? (famOtro||'Otro') : famSel;

  const opSel  = document.getElementById('np-op').value;
  const opOtro = document.getElementById('np-op-otro').value.trim();
  const op     = opSel==='OT_OP' ? (opOtro||'Otra') : opSel;

  const pzas = parseInt(document.getElementById('np-pzas').value);
  if(!familia||!op||!pzas){ alert('Completa: familia, operación y número de piezas.'); return; }

  const nops   = parseInt(document.getElementById('np-nops').value)||1;
  const nombres= getNombresOps();

  const p = {
    id: uid(), inicio: now().toISOString(), fin: null,
    familia, famLabel: famSel==='OT'?famOtro:familia,
    clave: document.getElementById('np-clave').value.trim(),
    lote:  document.getElementById('np-lote').value.trim(),
    desc:  document.getElementById('np-desc').value.trim(),
    op, pzas, nops, nombres,
    pzasConf:null, defecto:0, pausa:0, incidencia:'', notas:[]
  };
  data.push(p); save();
  cerrarSheet('sheet-nuevo');
  render();
}

// ── Cierre ────────────────────────────────────────────────────────────────
function abrirCierre(id){
  cerrandoId=id;
  const p=data.find(x=>x.id===id);
  const el=mins(p.inicio,new Date().toISOString());
  document.getElementById('cierre-info').innerHTML=
    `<strong>${p.desc||p.clave||p.familia}</strong> · ${p.op}<br>Inicio ${hhmm(p.inicio)} · <strong>${el} min transcurridos</strong>`;
  document.getElementById('c-pzas').value=p.pzas;
  document.getElementById('c-def').value=0;
  document.getElementById('c-pausa').value=0;
  document.getElementById('c-inc').value='';
  cerrarSheet('sheet-nuevo');
  abrirSheet('sheet-cierre');
}
function confirmarCierre(){
  const p=data.find(x=>x.id===cerrandoId); if(!p) return;
  p.fin=now().toISOString();
  p.pzasConf=parseInt(document.getElementById('c-pzas').value)||p.pzas;
  p.defecto=parseInt(document.getElementById('c-def').value)||0;
  p.pausa=parseInt(document.getElementById('c-pausa').value)||0;
  p.incidencia=document.getElementById('c-inc').value.trim();
  save(); cerrandoId=null;
  cerrarSheet('sheet-cierre');
  render();
}

// ── Nota rápida ───────────────────────────────────────────────────────────
function abrirNota(id){
  notaId=id;
  const p=data.find(x=>x.id===id);
  document.getElementById('nota-info').textContent=`${p.desc||p.clave||p.familia} · ${p.op}`;
  document.getElementById('nota-txt').value='';
  abrirSheet('sheet-nota');
  setTimeout(()=>document.getElementById('nota-txt').focus(),350);
}
function confirmarNota(){
  const txt=document.getElementById('nota-txt').value.trim();
  if(!txt){ cerrarSheet('sheet-nota'); return; }
  const p=data.find(x=>x.id===notaId);
  if(p){ p.notas=p.notas||[]; p.notas.push({t:hhmm(now()),txt}); save(); }
  notaId=null; cerrarSheet('sheet-nota'); render();
}

// ── Resumen ───────────────────────────────────────────────────────────────
let tabActivo=0;
function abrirResumen(){ buildResumen(); abrirSheet('sheet-resumen'); }
function switchTab(i){
  tabActivo=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  buildResumen();
}
function buildResumen(){
  const ce=cerrados();
  const el=document.getElementById('res-content');
  if(!ce.length){ el.innerHTML='<div class="empty">Sin registros cerrados hoy</div>'; return; }
  if(tabActivo===0){
    const byP={};
    ce.forEach(p=>{ const k=p.clave||p.desc||p.familia; if(!byP[k]) byP[k]={desc:p.desc||p.clave||p.familia,mins:0,hmh:0,pzas:0,ops:new Set()}; const m=netMins(p); byP[k].mins+=m; byP[k].hmh+=m*(p.nops||1); byP[k].pzas+=p.pzasConf||p.pzas; byP[k].ops.add(p.op); });
    el.innerHTML='<table class="res-table"><thead><tr><th>Producto</th><th>Min</th><th>Min-H</th><th>Pzas</th></tr></thead><tbody>'+
      Object.values(byP).map(p=>`<tr><td><strong>${p.desc}</strong><br><span style="color:var(--muted);font-size:11px">${[...p.ops].join(', ')}</span></td><td>${p.mins}</td><td>${p.hmh}</td><td>${p.pzas}</td></tr>`).join('')+'</tbody></table>';
  } else if(tabActivo===1){
    const byO={};
    ce.forEach(p=>{ if(!byO[p.op]) byO[p.op]={lotes:0,mins:0,hmh:0}; const m=netMins(p); byO[p.op].lotes++; byO[p.op].mins+=m; byO[p.op].hmh+=m*(p.nops||1); });
    el.innerHTML='<table class="res-table"><thead><tr><th>Operación</th><th>Lotes</th><th>Min</th><th>Min-H</th></tr></thead><tbody>'+
      Object.entries(byO).map(([op,d])=>`<tr><td>${op}</td><td>${d.lotes}</td><td>${d.mins}</td><td>${d.hmh}</td></tr>`).join('')+'</tbody></table>';
  } else {
    el.innerHTML='<table class="res-table"><thead><tr><th>Producto / Op.</th><th>Inicio</th><th>Fin</th><th>Min</th></tr></thead><tbody>'+
      ce.map(p=>{ const m=netMins(p); return `<tr><td><strong>${p.desc||p.clave||p.familia}</strong><br><span style="color:var(--muted);font-size:11px">${p.op}${p.lote?' · '+p.lote:''}</span></td><td>${hhmm(p.inicio)}</td><td>${hhmm(p.fin)}</td><td>${m}</td></tr>`; }).join('')+'</tbody></table>';
  }
}

// ── Exportar CSV ──────────────────────────────────────────────────────────
function exportCSV(){
  const ce=cerrados();
  if(!ce.length){ alert('Sin datos para exportar.'); return; }
  const hdr=['fecha','familia','clave','orden_linea','desc','op','inicio','fin','mins_netos','pausa_min','piezas','defecto','num_operadores','operadores','min_hombre','incidencia','notas'];
  const rows=ce.map(p=>{ const m=netMins(p); return [new Date(p.inicio).toLocaleDateString('es-MX'),p.familia,p.clave,p.lote,p.desc,p.op,hhmm(p.inicio),hhmm(p.fin),m,p.pausa||0,p.pzasConf||p.pzas,p.defecto||0,p.nops,(p.nombres||[]).join(' | '),m*(p.nops||1),p.incidencia||'',(p.notas||[]).map(n=>n.t+': '+n.txt).join(' | ')].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','); });
  const csv=[hdr.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='tiempos_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const ac=activos(), ce=cerrados();
  const totalMins=ce.reduce((s,p)=>s+netMins(p),0);
  const c=document.getElementById('content');
  let html='';

  html+=`<div class="stats">
    <div class="stat"><div class="stat-val stat-val-warn">${ac.length}</div><div class="stat-lbl">Activos</div></div>
    <div class="stat"><div class="stat-val stat-val-ok">${ce.length}</div><div class="stat-lbl">Cerrados</div></div>
    <div class="stat"><div class="stat-val">${totalMins}</div><div class="stat-lbl">Min hoy</div></div>
  </div>`;

  html+=`<div class="sec-label">En curso ahora</div>`;
  if(!ac.length){
    html+=`<div class="card"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="none"/></svg>Sin procesos activos<br><span style="font-size:12px">Toca el botón + para registrar uno</span></div></div>`;
  } else {
    ac.forEach(p=>{
      const ultimaNota=(p.notas||[]).length?`<div class="obs-badge">📝 ${p.notas[p.notas.length-1].txt}</div>`:'';
      const nombresChip=p.nombres&&p.nombres.length?`<span class="chip">${p.nombres.join(', ')}</span>`:'';
      html+=`<div class="card card-active">
        <div class="card-head">
          <div class="card-info">
            <div class="card-prod">${p.desc||p.clave||p.familia}</div>
            <div class="card-op">${p.op}</div>
            <div class="card-chips">
              <span class="chip chip-warn">En curso</span>
              ${p.clave?`<span class="chip">${p.clave}</span>`:''}
              ${p.lote?`<span class="chip">${p.lote}</span>`:''}
              <span class="chip">${p.nops} op. · ${p.pzas} pzas</span>
              ${nombresChip}
            </div>
          </div>
          <div style="flex-shrink:0;text-align:right">
            <div class="timer" id="tmr-${p.id}">${elapsed(p.inicio)}</div>
            <div class="timer-label">desde ${hhmm(p.inicio)}</div>
          </div>
        </div>
        ${ultimaNota}
        <div class="card-foot">
          <button class="btn btn-close" onclick="abrirCierre('${p.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Cerrar proceso
          </button>
          <button class="btn btn-note" onclick="abrirNota('${p.id}')" aria-label="Nota rápida">📝</button>
        </div>
      </div>`;
    });
  }

  if(ce.length){
    html+=`<div class="sec-label">Cerrados hoy</div><div class="hist">`;
    ce.forEach(p=>{
      const m=netMins(p), hmh=m*(p.nops||1);
      html+=`<div class="hist-row">
        <div style="min-width:0;flex:1">
          <div class="hist-prod">${p.desc||p.clave||p.familia}</div>
          <div class="hist-op">${p.op}${p.lote?' · '+p.lote:''} · ${p.pzasConf||p.pzas} pzas${p.nops>1?' · '+p.nops+' ops':''}</div>
          ${p.nombres&&p.nombres.length?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${p.nombres.join(', ')}</div>`:''}
          ${p.incidencia?`<div style="font-size:11px;color:var(--amber);margin-top:3px">⚠ ${p.incidencia}</div>`:''}
        </div>
        <div class="hist-right">
          <div class="hist-mins">${m} min</div>
          <div class="hist-time">${hhmm(p.inicio)} → ${hhmm(p.fin)}</div>
          ${hmh!==m?`<div style="font-size:10px;color:var(--muted)">${hmh} min-H</div>`:''}
        </div>
      </div>`;
    });
    html+='</div>';
  }

  c.innerHTML=html;
}

// ── Tick ──────────────────────────────────────────────────────────────────
function tick(){ activos().forEach(p=>{ const el=document.getElementById('tmr-'+p.id); if(el) el.textContent=elapsed(p.inicio); }); }

render();
setInterval(tick,1000);
if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});

// Detectar iPhone/iOS y mostrar aviso
const esiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if(esiOS) document.getElementById('ios-banner').style.display='block';
</script>
